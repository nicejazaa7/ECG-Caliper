<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECG Caliper Tool</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --font: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #topbar h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    white-space: nowrap;
  }
  .sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  /* TOOL SELECTOR */
  #tool-group {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tool-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--text); }
  .tool-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tool-btn.custom-active { color: #000; border-color: transparent; }

  /* NOTE */
  #note-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 200px;
  }
  #note-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    flex: 1;
    min-width: 120px;
  }
  #note-input:focus { outline: none; border-color: var(--accent); }

  /* RIGHT SIDE BUTTONS */
  .action-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--text); }
  .action-btn.danger:hover { border-color: #f85149; color: #f85149; }

  /* CUSTOM MODAL */
  #custom-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #custom-modal.open { display: flex; }
  #custom-modal-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    width: 320px;
  }
  #custom-modal h3 { font-size: 13px; margin-bottom: 12px; color: var(--accent); }
  #custom-label-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  #custom-label-input:focus { outline: none; border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button {
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
  }
  .modal-btns button.confirm {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* CANVAS AREA */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    cursor: crosshair;
  }
  #canvas-wrap.pan-mode { cursor: grab; }
  #canvas-wrap.pan-mode:active { cursor: grabbing; }
  #ecg-img {
    position: absolute;
    transform-origin: 0 0;
    user-select: none;
    pointer-events: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  #preview-line {
    position: absolute;
    pointer-events: none;
    display: none;
  }

  /* DROP ZONE */
  #dropzone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    z-index: 10;
  }
  #dropzone.hidden { display: none; }
  #dropzone svg { opacity: 0.3; }
  #dropzone p { font-size: 14px; }
  #dropzone span { font-size: 11px; opacity: 0.6; }
  #file-input { display: none; }
  #upload-btn {
    padding: 6px 18px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
  }
  #upload-btn:hover { border-color: var(--accent); }

  /* SIDEBAR */
  #sidebar {
    width: 240px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  #sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  #measurements-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .meas-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .meas-item:hover { background: var(--surface2); }
  .meas-item.selected { background: var(--surface2); outline: 1px solid var(--border); }
  .meas-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .meas-label {
    flex: 1;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .meas-value {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .meas-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .meas-item:hover .meas-del { opacity: 1; }
  .meas-del:hover { color: #f85149; }

  /* STATUSBAR */
  #statusbar {
    padding: 4px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #statusbar span { display: flex; align-items: center; gap: 4px; }

  /* CALIPER LINES ON SVG */
  .caliper-line { stroke-width: 1.5; }
  .caliper-end { stroke-width: 1.5; }
  .caliper-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    paint-order: stroke;
    stroke-width: 3;
    stroke-linejoin: round;
  }

  /* NOTE DISPLAY */
  #note-display {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(13,17,23,0.85);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--text);
    max-width: 360px;
    pointer-events: none;
    display: none;
    z-index: 5;
    line-height: 1.5;
  }

  scrollbar-color: var(--border) var(--surface);
  #measurements-list::-webkit-scrollbar { width: 4px; }
  #measurements-list::-webkit-scrollbar-track { background: var(--surface); }
  #measurements-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>⬡ ECG CALIPER</h1>
  <div class="sep"></div>

  <div id="tool-group">
    <button class="tool-btn active" data-tool="RR" style="--tc:#e05252">RR</button>
    <button class="tool-btn" data-tool="PR" style="--tc:#52abe0">PR</button>
    <button class="tool-btn" data-tool="PP" style="--tc:#52e0a0">PP</button>
    <button class="tool-btn" data-tool="QRS" style="--tc:#e0b852">QRS</button>
    <button class="tool-btn" data-tool="QT" style="--tc:#b852e0">QT</button>
    <button class="tool-btn" data-tool="CUSTOM" style="--tc:#e08852" id="custom-btn">+ CUSTOM</button>
  </div>

  <div class="sep"></div>

  <div id="note-wrap">
    <span style="color:var(--text-muted);font-size:10px;white-space:nowrap">DX NOTE</span>
    <input type="text" id="note-input" placeholder="e.g. 2nd degree Mobitz II with intermittent complete AV block" maxlength="200">
  </div>

  <div class="sep"></div>

  <label id="upload-topbtn" class="action-btn" for="file-input" style="cursor:pointer">📂 Load ECG</label>
  <input type="file" id="file-input" accept="image/*">
  <button class="action-btn" id="pan-btn">✋ Pan</button>
  <button class="action-btn" id="zoom-in-btn">＋</button>
  <button class="action-btn" id="zoom-out-btn">－</button>
  <button class="action-btn" id="reset-btn">↺ Reset</button>
  <button class="action-btn" id="export-btn">⬇ Export PNG</button>
  <button class="action-btn danger" id="clear-btn">✕ Clear All</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- CANVAS -->
  <div id="canvas-wrap" id="cw">
    <div id="dropzone">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
      </svg>
      <p>Drop ECG image here</p>
      <span>or</span>
      <label id="upload-btn" for="file-input">Choose file</label>
      <span style="margin-top:4px;font-size:10px">JPG · PNG · WebP · BMP</span>
    </div>
    <img id="ecg-img" src="" alt="">
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="note-display"></div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">Measurements</div>
    <div id="measurements-list"></div>
  </div>
</div>

<!-- STATUSBAR -->
<div id="statusbar">
  <span id="sb-tool">Tool: RR</span>
  <span id="sb-count">Calipers: 0</span>
  <span id="sb-zoom">Zoom: 100%</span>
  <span id="sb-pos">x: — y: —</span>
  <span id="sb-hint">Click → drag → release to place caliper</span>
</div>

<!-- CUSTOM LABEL MODAL -->
<div id="custom-modal">
  <div id="custom-modal-inner">
    <h3>Custom Caliper Label</h3>
    <input type="text" id="custom-label-input" placeholder="e.g. AH interval" maxlength="20">
    <div class="modal-btns">
      <button id="modal-cancel">Cancel</button>
      <button class="confirm" id="modal-ok">Set & Draw</button>
    </div>
  </div>
</div>

<script>
const TOOLS = {
  RR:     { color: '#e05252', label: 'RR' },
  PR:     { color: '#52abe0', label: 'PR' },
  PP:     { color: '#52e0a0', label: 'PP' },
  QRS:    { color: '#e0b852', label: 'QRS' },
  QT:     { color: '#b852e0', label: 'QT' },
  CUSTOM: { color: '#e08852', label: 'CUSTOM' },
};

/* shade generator: same hue, varying lightness */
function makeShades(hex, count) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const shades = [];
  for (let i = 0; i < count; i++) {
    const t = count === 1 ? 0 : i / (count - 1);
    const factor = 0.7 + t * 0.5;
    const nr = Math.min(255, Math.round(r * factor));
    const ng = Math.min(255, Math.round(g * factor));
    const nb = Math.min(255, Math.round(b * factor));
    shades.push(`rgb(${nr},${ng},${nb})`);
  }
  return shades;
}

let measurements = [];   /* [{id, toolKey, label, x1, y1, x2, y2, imgX1, imgX2}] */
let counters = {};       /* per tool: count of placed calipers */
let activeTool = 'RR';
let customLabel = '';
let panMode = false;

let imgLoaded = false;
let imgNatW = 1, imgNatH = 1;
let scale = 1, offX = 0, offY = 0;

let drawing = false;
let drawStart = null;  /* {ix, iy} in image coords */
let selectedId = null;

const canvasWrap = document.getElementById('canvas-wrap');
const ecgImg    = document.getElementById('ecg-img');
const overlay   = document.getElementById('overlay');
const dropzone  = document.getElementById('dropzone');
const noteInput = document.getElementById('note-input');
const noteDisplay = document.getElementById('note-display');
const measureList = document.getElementById('measurements-list');
const sbTool   = document.getElementById('sb-tool');
const sbCount  = document.getElementById('sb-count');
const sbZoom   = document.getElementById('sb-zoom');
const sbPos    = document.getElementById('sb-pos');
const panBtn   = document.getElementById('pan-btn');

/* ─── FILE LOAD ─── */
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});
canvasWrap.addEventListener('dragover', e => { e.preventDefault(); });
canvasWrap.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  ecgImg.onload = () => {
    imgNatW = ecgImg.naturalWidth;
    imgNatH = ecgImg.naturalHeight;
    imgLoaded = true;
    fitImage();
    dropzone.classList.add('hidden');
    measurements = [];
    counters = {};
    render();
  };
  ecgImg.src = url;
}

function fitImage() {
  const cw = canvasWrap.clientWidth;
  const ch = canvasWrap.clientHeight;
  scale = Math.min(cw / imgNatW, ch / imgNatH) * 0.95;
  offX = (cw - imgNatW * scale) / 2;
  offY = (ch - imgNatH * scale) / 2;
  applyTransform();
}

function applyTransform() {
  ecgImg.style.transform = `translate(${offX}px, ${offY}px) scale(${scale})`;
  overlay.style.transform = 'none';
  sbZoom.textContent = `Zoom: ${Math.round(scale * 100)}%`;
}

/* canvas coords → image coords */
function toImg(cx, cy) {
  return { ix: (cx - offX) / scale, iy: (cy - offY) / scale };
}
function toCanvas(ix, iy) {
  return { cx: ix * scale + offX, cy: iy * scale + offY };
}

/* ─── TOOL BUTTONS ─── */
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tool = btn.dataset.tool;
    if (tool === 'CUSTOM') {
      openCustomModal();
      return;
    }
    setTool(tool);
  });
});

function setTool(tool) {
  activeTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-tool="${tool}"]`);
  if (btn) btn.classList.add('active');
  sbTool.textContent = `Tool: ${tool === 'CUSTOM' ? customLabel || 'CUSTOM' : tool}`;
}

/* ─── CUSTOM MODAL ─── */
const customModal = document.getElementById('custom-modal');
const customLabelInput = document.getElementById('custom-label-input');

function openCustomModal() {
  customLabelInput.value = '';
  customModal.classList.add('open');
  customLabelInput.focus();
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  customModal.classList.remove('open');
});
document.getElementById('modal-ok').addEventListener('click', confirmCustom);
customLabelInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmCustom();
  if (e.key === 'Escape') customModal.classList.remove('open');
});

function confirmCustom() {
  const val = customLabelInput.value.trim();
  if (!val) return;
  customLabel = val.toUpperCase().slice(0, 10);
  customModal.classList.remove('open');
  setTool('CUSTOM');
  const btn = document.querySelector('[data-tool="CUSTOM"]');
  btn.textContent = `✎ ${customLabel}`;
}

/* ─── PAN MODE ─── */
panBtn.addEventListener('click', () => {
  panMode = !panMode;
  panBtn.style.color = panMode ? 'var(--accent)' : '';
  panBtn.style.borderColor = panMode ? 'var(--accent)' : '';
  canvasWrap.style.cursor = panMode ? 'grab' : 'crosshair';
});

/* ─── ZOOM ─── */
document.getElementById('zoom-in-btn').addEventListener('click', () => zoomAt(canvasWrap.clientWidth/2, canvasWrap.clientHeight/2, 1.25));
document.getElementById('zoom-out-btn').addEventListener('click', () => zoomAt(canvasWrap.clientWidth/2, canvasWrap.clientHeight/2, 0.8));
document.getElementById('reset-btn').addEventListener('click', () => { if (imgLoaded) fitImage(); render(); });

canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  if (!imgLoaded) return;
  const rect = canvasWrap.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 0.88;
  zoomAt(cx, cy, factor);
}, { passive: false });

function zoomAt(cx, cy, factor) {
  const { ix, iy } = toImg(cx, cy);
  scale = Math.max(0.05, Math.min(30, scale * factor));
  offX = cx - ix * scale;
  offY = cy - iy * scale;
  applyTransform();
  render();
}

/* ─── PAN DRAG ─── */
let panDrag = false, panStart = null;
canvasWrap.addEventListener('mousedown', e => {
  if (panMode) {
    panDrag = true;
    panStart = { x: e.clientX, y: e.clientY, offX, offY };
    canvasWrap.style.cursor = 'grabbing';
    return;
  }
  if (!imgLoaded) return;
  const rect = canvasWrap.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  drawing = true;
  drawStart = toImg(cx, cy);
});

canvasWrap.addEventListener('mousemove', e => {
  const rect = canvasWrap.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  sbPos.textContent = `x: ${Math.round(cx)} y: ${Math.round(cy)}`;

  if (panDrag && panStart) {
    offX = panStart.offX + (e.clientX - panStart.x);
    offY = panStart.offY + (e.clientY - panStart.y);
    applyTransform();
    render();
    return;
  }
  if (drawing && drawStart) {
    renderPreview(drawStart, toImg(cx, cy));
  }
});

canvasWrap.addEventListener('mouseup', e => {
  if (panDrag) {
    panDrag = false;
    canvasWrap.style.cursor = panMode ? 'grab' : 'crosshair';
    return;
  }
  if (!drawing || !drawStart) return;
  drawing = false;
  const rect = canvasWrap.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const end = toImg(cx, cy);
  const dx = Math.abs(end.ix - drawStart.ix);
  if (dx < 3) { drawStart = null; render(); return; }
  placeMeasurement(drawStart, end);
  drawStart = null;
});

/* also handle touch */
canvasWrap.addEventListener('touchstart', e => {
  if (!imgLoaded || panMode) return;
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvasWrap.getBoundingClientRect();
  drawing = true;
  drawStart = toImg(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

canvasWrap.addEventListener('touchmove', e => {
  if (!drawing) return;
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvasWrap.getBoundingClientRect();
  renderPreview(drawStart, toImg(t.clientX - rect.left, t.clientY - rect.top));
}, { passive: false });

canvasWrap.addEventListener('touchend', e => {
  if (!drawing || !drawStart) return;
  drawing = false;
  const t = e.changedTouches[0];
  const rect = canvasWrap.getBoundingClientRect();
  const end = toImg(t.clientX - rect.left, t.clientY - rect.top);
  const dx = Math.abs(end.ix - drawStart.ix);
  if (dx < 3) { drawStart = null; render(); return; }
  placeMeasurement(drawStart, end);
  drawStart = null;
});

/* ─── PLACE MEASUREMENT ─── */
function placeMeasurement(start, end) {
  const toolKey = activeTool;
  const baseLabel = toolKey === 'CUSTOM' ? customLabel : toolKey;
  if (!counters[baseLabel]) counters[baseLabel] = 0;
  counters[baseLabel]++;
  const id = Date.now() + Math.random();
  const label = `${baseLabel}${counters[baseLabel]}`;
  const color = TOOLS[toolKey]?.color || '#e08852';
  measurements.push({
    id, toolKey, baseLabel, label, color,
    x1: start.ix, y1: start.iy,
    x2: end.ix,   y2: end.iy,
  });
  selectedId = id;
  render();
  updateSidebar();
}

/* ─── RENDER ─── */
function render() {
  const cw = canvasWrap.clientWidth;
  const ch = canvasWrap.clientHeight;
  overlay.setAttribute('width', cw);
  overlay.setAttribute('height', ch);

  /* group measurements by baseLabel to assign shades */
  const byBase = {};
  measurements.forEach(m => {
    if (!byBase[m.baseLabel]) byBase[m.baseLabel] = [];
    byBase[m.baseLabel].push(m);
  });

  let svgContent = '';
  measurements.forEach(m => {
    const group = byBase[m.baseLabel];
    const idx = group.indexOf(m);
    const shades = makeShades(m.color, group.length);
    const col = shades[idx] || m.color;

    const p1 = toCanvas(m.x1, m.y1);
    const p2 = toCanvas(m.x2, m.y2);
    const midY = (p1.cy + p2.cy) / 2;
    const midX = (p1.cx + p2.cx) / 2;
    const dx = p2.cx - p1.cx;
    const isRight = dx >= 0;
    const tickH = 12;

    const selected = m.id === selectedId;
    const sw = selected ? 2 : 1.5;
    const opacity = selected ? 1 : 0.85;

    svgContent += `
      <g opacity="${opacity}">
        <line x1="${p1.cx}" y1="${midY - tickH}" x2="${p1.cx}" y2="${midY + tickH}"
              stroke="${col}" stroke-width="${sw}" class="caliper-end"/>
        <line x1="${p2.cx}" y1="${midY - tickH}" x2="${p2.cx}" y2="${midY + tickH}"
              stroke="${col}" stroke-width="${sw}" class="caliper-end"/>
        <line x1="${p1.cx}" y1="${midY}" x2="${p2.cx}" y2="${midY}"
              stroke="${col}" stroke-width="${sw}" class="caliper-line"/>
        <text x="${midX}" y="${midY - 5}"
              text-anchor="middle"
              fill="${col}"
              stroke="#0d1117"
              class="caliper-label"
              font-size="11"
              font-family="'JetBrains Mono',monospace"
              font-weight="700"
              paint-order="stroke"
              stroke-width="3"
              stroke-linejoin="round"
              >${m.label} (${Math.round(Math.abs(p2.cx - p1.cx))}px)</text>
      </g>`;
  });

  overlay.innerHTML = svgContent;

  /* note display */
  const note = noteInput.value.trim();
  if (note) {
    noteDisplay.textContent = '📋 ' + note;
    noteDisplay.style.display = 'block';
  } else {
    noteDisplay.style.display = 'none';
  }

  sbCount.textContent = `Calipers: ${measurements.length}`;
}

function renderPreview(start, end) {
  render();
  const p1 = toCanvas(start.ix, start.iy);
  const p2 = toCanvas(end.ix, end.iy);
  const midY = (p1.cy + p2.cy) / 2;
  const midX = (p1.cx + p2.cx) / 2;
  const tickH = 10;
  const col = TOOLS[activeTool]?.color || '#e08852';
  const dx = Math.abs(p2.cx - p1.cx);

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('opacity', '0.6');
  g.innerHTML = `
    <line x1="${p1.cx}" y1="${midY - tickH}" x2="${p1.cx}" y2="${midY + tickH}" stroke="${col}" stroke-width="1.5"/>
    <line x1="${p2.cx}" y1="${midY - tickH}" x2="${p2.cx}" y2="${midY + tickH}" stroke="${col}" stroke-width="1.5"/>
    <line x1="${p1.cx}" y1="${midY}" x2="${p2.cx}" y2="${midY}" stroke="${col}" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="${midX}" y="${midY - 5}" text-anchor="middle" fill="${col}" font-size="10" font-family="'JetBrains Mono',monospace" font-weight="700"
          paint-order="stroke" stroke="#0d1117" stroke-width="3" stroke-linejoin="round">${Math.round(dx)}px</text>`;
  overlay.appendChild(g);
}

/* ─── SIDEBAR ─── */
function updateSidebar() {
  const byBase = {};
  measurements.forEach(m => {
    if (!byBase[m.baseLabel]) byBase[m.baseLabel] = [];
    byBase[m.baseLabel].push(m);
  });

  measureList.innerHTML = '';
  Object.entries(byBase).forEach(([base, group]) => {
    const shades = makeShades(group[0].color, group.length);
    const header = document.createElement('div');
    header.style.cssText = 'font-size:9px;font-weight:700;letter-spacing:0.1em;color:var(--text-muted);padding:8px 6px 2px;text-transform:uppercase;';
    header.textContent = base;
    measureList.appendChild(header);

    group.forEach((m, idx) => {
      const col = shades[idx];
      const item = document.createElement('div');
      item.className = 'meas-item' + (m.id === selectedId ? ' selected' : '');
      item.dataset.id = m.id;
      const dx = Math.abs(m.x2 - m.x1);
      item.innerHTML = `
        <div class="meas-dot" style="background:${col}"></div>
        <span class="meas-label" style="color:${col}">${m.label}</span>
        <span class="meas-value">${Math.round(dx)}px</span>
        <button class="meas-del" data-id="${m.id}" title="Delete">×</button>`;
      item.addEventListener('click', () => {
        selectedId = m.id;
        render();
        updateSidebar();
      });
      item.querySelector('.meas-del').addEventListener('click', e => {
        e.stopPropagation();
        measurements = measurements.filter(x => x.id != m.id);
        if (selectedId == m.id) selectedId = null;
        render();
        updateSidebar();
      });
      measureList.appendChild(item);
    });
  });
}

/* ─── NOTE ─── */
noteInput.addEventListener('input', () => {
  const words = noteInput.value.trim().split(/\s+/).filter(Boolean);
  if (words.length > 30) {
    noteInput.value = words.slice(0, 30).join(' ');
  }
  render();
});

/* ─── CLEAR ─── */
document.getElementById('clear-btn').addEventListener('click', () => {
  measurements = [];
  counters = {};
  selectedId = null;
  render();
  updateSidebar();
});

/* ─── EXPORT PNG ─── */
document.getElementById('export-btn').addEventListener('click', async () => {
  if (!imgLoaded) return;
  const canvas = document.createElement('canvas');
  const scale2 = 2;
  canvas.width = imgNatW * scale2;
  canvas.height = imgNatH * scale2;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(ecgImg, 0, 0, canvas.width, canvas.height);

  const scaleRatio = imgNatW / (imgNatW * (canvasWrap.clientWidth / (imgNatW * scale))) * scale2;
  const curScale = scale;
  const curOffX = offX;
  const curOffY = offY;

  const byBase = {};
  measurements.forEach(m => {
    if (!byBase[m.baseLabel]) byBase[m.baseLabel] = [];
    byBase[m.baseLabel].push(m);
  });

  measurements.forEach(m => {
    const group = byBase[m.baseLabel];
    const idx = group.indexOf(m);
    const shades = makeShades(m.color, group.length);
    const col = shades[idx];

    const sx1 = m.x1 * scale2;
    const sx2 = m.x2 * scale2;
    const midY = ((m.y1 + m.y2) / 2) * scale2;
    const midX = (sx1 + sx2) / 2;
    const tickH = 18;
    const lw = 2.5;

    ctx.strokeStyle = col;
    ctx.lineWidth = lw;
    ctx.beginPath(); ctx.moveTo(sx1, midY - tickH); ctx.lineTo(sx1, midY + tickH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx2, midY - tickH); ctx.lineTo(sx2, midY + tickH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx1, midY); ctx.lineTo(sx2, midY); ctx.stroke();

    ctx.font = `700 18px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.strokeText(`${m.label} (${Math.round(Math.abs(m.x2 - m.x1))}px)`, midX, midY - 8);
    ctx.fillStyle = col;
    ctx.fillText(`${m.label} (${Math.round(Math.abs(m.x2 - m.x1))}px)`, midX, midY - 8);
  });

  const note = noteInput.value.trim();
  if (note) {
    const pad = 16;
    ctx.font = '700 22px monospace';
    const tw = ctx.measureText('📋 ' + note).width + pad * 2;
    ctx.fillStyle = 'rgba(13,17,23,0.85)';
    ctx.fillRect(12, canvas.height - 52, tw, 40);
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    ctx.strokeRect(12, canvas.height - 52, tw, 40);
    ctx.fillStyle = '#e6edf3';
    ctx.fillText('📋 ' + note, 12 + pad, canvas.height - 24);
  }

  const a = document.createElement('a');
  a.download = 'ecg-annotated.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

/* ─── KEYBOARD ─── */
document.addEventListener('keydown', e => {
  if (e.target === noteInput || e.target === customLabelInput) return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedId) {
      measurements = measurements.filter(m => m.id !== selectedId);
      selectedId = null;
      render();
      updateSidebar();
    }
  }
  if (e.key === '1') setTool('RR');
  if (e.key === '2') setTool('PR');
  if (e.key === '3') setTool('PP');
  if (e.key === '4') setTool('QRS');
  if (e.key === '5') setTool('QT');
  if (e.key === 'p' || e.key === 'P') panBtn.click();
  if (e.key === 'Escape') { drawing = false; drawStart = null; render(); }
});

/* ─── INIT ─── */
window.addEventListener('resize', () => {
  if (imgLoaded) render();
});

/* initial empty render */
overlay.setAttribute('width', canvasWrap.clientWidth);
overlay.setAttribute('height', canvasWrap.clientHeight);
</script>
